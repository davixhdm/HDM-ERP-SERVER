<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>License Key Issued</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
  <div style="background: #2563EB; padding: 20px; color: #fff; text-align: center;">
    <h2>HDM ERP License Key</h2>
  </div>
  <div style="padding: 20px;">
    <h3>Hello {{name}},</h3>

      <strong>{{licenseKey}}</strong>
    </div>
    <p>Use this key to activate your account.</p>
    <p>Thank you,<br>HDM ERP Team</p>
  </div>
</body>
</html>
